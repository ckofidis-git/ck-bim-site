<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="CK monogram — isometric BIM wireframe cube">
  <defs>
    <linearGradient id="ckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Faint full cube wireframe (construction lines) -->
  <g stroke="#64748b" stroke-width="1.2" stroke-opacity="0.45" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="50,14 81.2,32 81.2,68 50,86 18.8,68 18.8,32"/>
    <line x1="50" y1="50" x2="18.8" y2="32"/>
    <line x1="50" y1="50" x2="81.2" y2="32"/>
    <line x1="50" y1="50" x2="50" y2="86"/>
  </g>

  <!-- The C : left bracket of the cube -->
  <polyline points="50,14 18.8,32 18.8,68 50,86" fill="none"
            stroke="url(#ckGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- The K : centre spine + diagonals to the right vertices -->
  <g stroke="url(#ckGrad)" stroke-width="4.5" stroke-linecap="round" fill="none">
    <line x1="50" y1="14" x2="50" y2="86"/>
    <line x1="50" y1="50" x2="81.2" y2="32"/>
    <line x1="50" y1="50" x2="81.2" y2="68"/>
  </g>

  <!-- Coordination nodes -->
  <g fill="#0b1120" stroke="url(#ckGrad)" stroke-width="2">
    <circle cx="50" cy="14" r="3.4"/>
    <circle cx="18.8" cy="32" r="3.4"/>
    <circle cx="18.8" cy="68" r="3.4"/>
    <circle cx="50" cy="86" r="3.4"/>
    <circle cx="81.2" cy="32" r="3.4"/>
    <circle cx="81.2" cy="68" r="3.4"/>
  </g>
  <circle cx="50" cy="50" r="4.2" fill="url(#ckGrad)"/>
</svg>
