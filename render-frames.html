<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CK — cinematic frame renderer (dev tool)</title>
<style>
  body { background: #0a0f1e; color: #e2e8f0; font-family: monospace; margin: 20px; }
  canvas { border: 1px solid #334; max-width: 100%; height: auto; }
  #status { margin: 12px 0; font-size: 14px; }
</style>
</head>
<body>
<!-- Dev tool: renders scroll-cinematic frame sequences and POSTs each frame
     to serve.ps1 (/save). Not linked from the site.
     Usage:  /render-frames.html?scene=city      (180 frames -> w1600, w960)
             /render-frames.html?scene=viaduct   (140 frames -> viaduct-w1600, viaduct-w960)
             /render-frames.html?scene=terminal  (140 frames -> terminal-w1600, terminal-w960) -->
<div id="status">loading three.js…</div>
<canvas id="c" width="1600" height="900"></canvas>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";

const CYAN = 0x38bdf8, INDIGO = 0x818cf8, SLATE = 0x64748b, BLUE = 0x60a5fa;
const status = document.getElementById("status");
const canvas = document.getElementById("c");

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0f1e);

const camera = new THREE.PerspectiveCamera(42, 16 / 9, 0.1, 100);

// ---------- helpers ----------
function lineMat(color, opacity) {
  return new THREE.LineBasicMaterial({ color, transparent: true, opacity });
}
function edges(geom, color, opacity) {
  return new THREE.LineSegments(new THREE.EdgesGeometry(geom, 12), lineMat(color, opacity));
}
function polyline(points, color, opacity) {
  const g = new THREE.BufferGeometry().setFromPoints(points.map(p => new THREE.Vector3(...p)));
  return new THREE.Line(g, lineMat(color, opacity));
}
// arc in the x/y plane at depth z, centred (cx, cy)
function arc(r, cx, cy, z, color, opacity, start = 0, end = Math.PI, seg = 24) {
  const pts = [];
  for (let i = 0; i <= seg; i++) {
    const a = start + (end - start) * (i / seg);
    pts.push([cx + r * Math.cos(a), cy + r * Math.sin(a), z]);
  }
  return polyline(pts, color, opacity);
}
function rand(seed) {
  const x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
  return x - Math.floor(x);
}
const easeOut = (k) => 1 - Math.pow(1 - k, 3);
const smooth = (k) => k * k * (3 - 2 * k);
const clamp01 = (v) => Math.max(0, Math.min(1, v));
function gridLines(extent, step, y, color, opacity) {
  const g = new THREE.Group();
  for (let i = -extent; i <= extent; i += step) {
    g.add(polyline([[-extent, y, i], [extent, y, i]], color, opacity));
    g.add(polyline([[i, y, -extent], [i, y, extent]], color, opacity));
  }
  return g;
}
function dataPoints(n, seedBase, spread, yMin, yMax) {
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    pos[i * 3] = (rand(i * 3 + seedBase) - 0.5) * spread;
    pos[i * 3 + 1] = yMin + rand(i * 3 + seedBase + 1) * (yMax - yMin);
    pos[i * 3 + 2] = (rand(i * 3 + seedBase + 2) - 0.5) * spread;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  return new THREE.Points(g, new THREE.PointsMaterial({ color: CYAN, size: 0.045, transparent: true, opacity: 0.5 }));
}
function bezier3(a, b, c, k) {
  const u = 1 - k;
  return a * u * u + b * 2 * u * k + c * k * k;
}
function camPath(CAM, k) {
  camera.position.set(
    bezier3(CAM[0].pos[0], CAM[1].pos[0], CAM[2].pos[0], k),
    bezier3(CAM[0].pos[1], CAM[1].pos[1], CAM[2].pos[1], k),
    bezier3(CAM[0].pos[2], CAM[1].pos[2], CAM[2].pos[2], k)
  );
  camera.lookAt(
    bezier3(CAM[0].look[0], CAM[1].look[0], CAM[2].look[0], k),
    bezier3(CAM[0].look[1], CAM[1].look[1], CAM[2].look[1], k),
    bezier3(CAM[0].look[2], CAM[1].look[2], CAM[2].look[2], k)
  );
}

// ============================================================
// SCENE: city — the CK cube seeds a digital-twin city (intro)
// ============================================================
function buildCity() {
  scene.fog = new THREE.Fog(0x0a0f1e, 10, 36);
  scene.add(gridLines(30, 1, 0, CYAN, 0.14));

  const ckCube = new THREE.Group();
  const R = 1.0, h = R / 2;
  ckCube.add(edges(new THREE.BoxGeometry(R, R, R), SLATE, 0.5));
  ckCube.add(polyline([[-h, h, h], [-h, h, -h], [-h, -h, -h], [-h, -h, h]], CYAN, 1));
  ckCube.add(polyline([[0, h, h], [0, -h, h]], BLUE, 1));
  ckCube.add(polyline([[0, 0, h], [h, h, h]], INDIGO, 1));
  ckCube.add(polyline([[0, 0, h], [h, -h, h]], INDIGO, 1));
  ckCube.position.y = 1.5;
  scene.add(ckCube);

  const towers = [];
  let n = 0;
  for (let gx = -9; gx <= 9; gx += 2) {
    for (let gz = -9; gz <= 9; gz += 2) {
      const dist = Math.hypot(gx, gz);
      if (dist < 2.4) continue;
      if (rand(n * 7 + 1) < 0.32) { n++; continue; }
      const ht = 0.6 + rand(n * 13 + 2) * 3.2;
      const w = 0.55 + rand(n * 17 + 3) * 0.5;
      const cp = rand(n * 23 + 4);
      const color = cp < 0.5 ? SLATE : (cp < 0.8 ? CYAN : INDIGO);
      const tower = edges(new THREE.BoxGeometry(w, ht, w), color, cp < 0.5 ? 0.35 : 0.6);
      tower.position.set(gx + (rand(n * 29 + 5) - 0.5) * 0.7, 0, gz + (rand(n * 31 + 6) - 0.5) * 0.7);
      tower.userData = { h: ht, start: 0.06 + (dist / 13) * 0.45 + rand(n * 37 + 7) * 0.08, dur: 0.16 };
      scene.add(tower);
      towers.push(tower);
      n++;
    }
  }

  const terminal = new THREE.Group();
  for (let i = -3; i <= 3; i++) {
    terminal.add(arc(1.5 - Math.abs(i) * 0.11, 0, 0, i * 0.5, i % 2 ? CYAN : INDIGO, 0.7, 0, Math.PI, 20));
  }
  terminal.position.set(-7.5, 0, 3.5);
  terminal.rotation.y = 0.5;
  terminal.userData = { start: 0.34, dur: 0.2 };
  scene.add(terminal);

  const viaduct = new THREE.Group();
  viaduct.add(polyline([[-14, 1.15, 0], [14, 1.15, 0]], CYAN, 0.75));
  viaduct.add(polyline([[-14, 1.05, 0], [14, 1.05, 0]], INDIGO, 0.5));
  for (let x = -13; x <= 13; x += 1.6) viaduct.add(polyline([[x, 0, 0], [x, 1.05, 0]], SLATE, 0.5));
  viaduct.position.set(0, 0, -9.5);
  viaduct.userData = { start: 0.5, dur: 0.2 };
  scene.add(viaduct);

  const points = dataPoints(320, 50, 26, 0.3, 7);
  scene.add(points);

  const CAM = [
    { pos: [1.6, 1.4, 5.2], look: [0, 1.4, 0] },
    { pos: [6.5, 2.6, 4.0], look: [0, 1.2, 0] },
    { pos: [0.0, 9.5, 17.0], look: [0, 1.2, 0] },
  ];

  return function setFrame(t) {
    camPath(CAM, smooth(t));
    const cs = easeOut(clamp01(t / 0.07));
    ckCube.scale.setScalar(Math.max(cs, 0.0001));
    ckCube.rotation.y = 0.6 + t * 2.4;
    for (const tw of towers) {
      const g = easeOut(clamp01((t - tw.userData.start) / tw.userData.dur));
      tw.scale.y = Math.max(g, 0.0001);
      tw.position.y = (tw.userData.h * tw.scale.y) / 2;
      tw.visible = g > 0.001;
    }
    for (const sp of [terminal, viaduct]) {
      const g = easeOut(clamp01((t - sp.userData.start) / sp.userData.dur));
      sp.scale.setScalar(Math.max(g, 0.0001));
      sp.visible = g > 0.001;
    }
    points.position.y = t * 0.6;
    points.material.opacity = 0.15 + 0.35 * clamp01(t / 0.3);
  };
}

// ============================================================
// SCENE: viaduct — piers rise, arches draw, deck extends,
// a light streak crosses; camera sweeps along the valley
// ============================================================
function buildViaduct() {
  scene.fog = new THREE.Fog(0x0a0f1e, 12, 40);
  const FLOOR = -2, DECK = 1.2;
  scene.add(gridLines(26, 1, FLOOR, CYAN, 0.06));

  // river under the viaduct
  const riverPts = [];
  for (let z = -12; z <= 12; z += 1) {
    riverPts.push([Math.sin(z * 0.5) * 1.4, FLOOR + 0.03, z]);
  }
  scene.add(polyline(riverPts, BLUE, 0.3));

  // piers
  const piers = [];
  for (let x = -10; x <= 10; x += 2.5) {
    const pier = new THREE.Group();
    pier.add(edges(new THREE.CylinderGeometry(0.12, 0.2, DECK - FLOOR, 8), INDIGO, 0.7));
    pier.add(polyline([[-0.45, FLOOR + 0.02 - (FLOOR + (DECK - FLOOR) / 2), -0.45], [0.45, FLOOR + 0.02 - (FLOOR + (DECK - FLOOR) / 2), 0.45]], SLATE, 0.4));
    pier.position.set(x, (FLOOR + DECK) / 2, 0);
    pier.userData = { start: 0.04 + ((x + 10) / 20) * 0.3, dur: 0.12, h: DECK - FLOOR };
    scene.add(pier);
    piers.push(pier);
  }

  // arches between piers (two planes)
  const arches = [];
  for (let x = -10; x < 10; x += 2.5) {
    const grp = new THREE.Group();
    for (const z of [-0.42, 0.42]) {
      grp.add(arc(1.0, 0, 0, z, CYAN, 0.75, Math.PI, 2 * Math.PI, 20));
    }
    grp.position.set(x + 1.25, DECK - 0.1, 0);
    grp.userData = { start: 0.18 + ((x + 10) / 20) * 0.3, dur: 0.12 };
    scene.add(grp);
    arches.push(grp);
  }

  // deck — extends left to right (pivot trick: group at left end)
  const deck = new THREE.Group();
  const deckInner = new THREE.Group();
  deckInner.add(edges(new THREE.BoxGeometry(21, 0.16, 1.1), CYAN, 0.85));
  for (let x = -10; x <= 10; x += 0.8) {
    deckInner.add(polyline([[x, 0.1, -0.55], [x, 0.1, 0.55]], SLATE, 0.35));
  }
  deckInner.add(polyline([[-10.5, 0.14, -0.4], [10.5, 0.14, -0.4]], INDIGO, 0.6));
  deckInner.add(polyline([[-10.5, 0.14, 0.4], [10.5, 0.14, 0.4]], INDIGO, 0.6));
  deckInner.position.x = 10.5;
  deck.add(deckInner);
  deck.position.set(-10.5, DECK, 0);
  scene.add(deck);

  // light streak (the "train")
  const streak = polyline([[0, 0, 0], [1.6, 0, 0]], 0xffffff, 0);
  const streakTrail = polyline([[-2.2, 0, 0], [0, 0, 0]], CYAN, 0);
  streak.position.y = DECK + 0.22;
  streakTrail.position.y = DECK + 0.22;
  scene.add(streak, streakTrail);

  const points = dataPoints(220, 90, 24, FLOOR + 0.5, 5);
  scene.add(points);

  const CAM = [
    { pos: [-9.0, -0.4, 5.0], look: [-4, 1.1, 0] },
    { pos: [0.0, 1.6, 7.0], look: [0, 1.0, 0] },
    { pos: [8.5, 3.6, 10.5], look: [1, 0.6, 0] },
  ];

  return function setFrame(t) {
    camPath(CAM, smooth(t));
    for (const p of piers) {
      const g = easeOut(clamp01((t - p.userData.start) / p.userData.dur));
      p.scale.y = Math.max(g, 0.0001);
      p.position.y = FLOOR + (p.userData.h * p.scale.y) / 2;
      p.visible = g > 0.001;
    }
    for (const a of arches) {
      const g = easeOut(clamp01((t - a.userData.start) / a.userData.dur));
      a.scale.setScalar(Math.max(g, 0.0001));
      a.visible = g > 0.001;
    }
    const dg = easeOut(clamp01((t - 0.3) / 0.3));
    deck.scale.x = Math.max(dg, 0.0001);
    deck.visible = dg > 0.001;
    // streak crosses near the end
    const sp = clamp01((t - 0.7) / 0.26);
    const on = sp > 0 && sp < 1 ? 1 : 0;
    streak.material.opacity = on * 0.95;
    streakTrail.material.opacity = on * 0.4;
    streak.position.x = -11 + 21.5 * sp;
    streakTrail.position.x = -11 + 21.5 * sp;
    points.material.opacity = 0.12 + 0.3 * clamp01(t / 0.3);
  };
}

// ============================================================
// SCENE: terminal — dolly down an assembling concourse toward
// a glowing gate
// ============================================================
function buildTerminal() {
  scene.fog = new THREE.Fog(0x0a0f1e, 8, 30);
  scene.add(gridLines(24, 1, 0, CYAN, 0.07));

  // roof ribs along the concourse
  const ribs = [];
  for (let i = 0; i < 15; i++) {
    const z = 8 - i * 1.5;
    const grp = new THREE.Group();
    grp.add(arc(3.6, 0, 0.4, 0, i % 2 ? CYAN : INDIGO, 0.8, 0.12 * Math.PI, 0.88 * Math.PI, 26));
    grp.position.z = z;
    grp.userData = { start: 0.02 + (i / 15) * 0.5, dur: 0.12 };
    scene.add(grp);
    ribs.push(grp);
  }
  // spine + side rails connecting ribs
  scene.add(polyline([[0, 3.95, 8], [0, 3.95, -13]], SLATE, 0.5));
  for (const sx of [-3.1, 3.1]) {
    scene.add(polyline([[sx, 2.1, 8], [sx, 2.1, -13]], SLATE, 0.4));
  }

  // gate frames along the sides
  const gates = [];
  for (let i = 0; i < 10; i++) {
    const z = 6 - i * 2.1;
    for (const sx of [-3.3, 3.3]) {
      const g = new THREE.Group();
      g.add(edges(new THREE.BoxGeometry(0.1, 1.6, 1.2), i % 3 === 0 ? CYAN : SLATE, 0.5));
      g.position.set(sx, 0.8, z);
      g.userData = { start: 0.06 + (i / 10) * 0.5, dur: 0.12 };
      scene.add(g);
      gates.push(g);
    }
  }

  // the glowing far gate
  const portal = new THREE.Group();
  for (const r of [0.7, 0.95, 1.2]) {
    portal.add(arc(r, 0, 1.5, 0, CYAN, 0.9, 0, Math.PI * 2, 40));
  }
  portal.add(edges(new THREE.BoxGeometry(3.4, 3.2, 0.08), INDIGO, 0.8));
  portal.children[3].position.y = 1.5;
  portal.position.z = -13.5;
  scene.add(portal);

  const points = dataPoints(260, 130, 20, 0.3, 4);
  scene.add(points);

  const CAM = [
    { pos: [0.3, 1.4, 9.5], look: [0, 1.6, 4] },
    { pos: [-0.3, 1.5, 1.5], look: [0, 1.5, -4] },
    { pos: [0.0, 1.6, -6.5], look: [0, 1.5, -13.5] },
  ];

  return function setFrame(t) {
    camPath(CAM, smooth(t));
    camera.position.x += Math.sin(t * Math.PI * 1.6) * 0.22;   // gentle walking sway
    for (const r of [...ribs, ...gates]) {
      const g = easeOut(clamp01((t - r.userData.start) / r.userData.dur));
      r.scale.setScalar(Math.max(g, 0.0001));
      r.visible = g > 0.001;
    }
    const pg = clamp01((t - 0.5) / 0.4);
    portal.scale.setScalar(Math.max(easeOut(pg), 0.0001));
    portal.visible = pg > 0.001;
    portal.rotation.z = t * 0.8;
    points.material.opacity = 0.15 + 0.3 * clamp01(t / 0.3);
  };
}

// ============================================================
// export pipeline
// ============================================================
const SCENES = {
  city:     { build: buildCity,     frames: 180, dirs: ["w1600", "w960"] },
  viaduct:  { build: buildViaduct,  frames: 140, dirs: ["viaduct-w1600", "viaduct-w960"] },
  terminal: { build: buildTerminal, frames: 140, dirs: ["terminal-w1600", "terminal-w960"] },
};
const sceneName = new URLSearchParams(location.search).get("scene") || "city";
const cfg = SCENES[sceneName];
const setFrame = cfg.build();

window.__progress = 0;
window.__done = false;
window.__error = null;

async function exportSet(width, height, dir, quality) {
  renderer.setSize(width, height, false);
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  for (let i = 0; i < cfg.frames; i++) {
    setFrame(i / (cfg.frames - 1));
    renderer.render(scene, camera);
    const blob = await new Promise((res) => canvas.toBlob(res, "image/jpeg", quality));
    const r = await fetch(`/save?name=frame_${String(i + 1).padStart(4, "0")}.jpg&dir=${dir}`, {
      method: "POST", body: blob,
    });
    if (!r.ok) throw new Error(`save failed: frame ${i + 1} -> ${r.status}`);
    window.__progress++;
    if (i % 10 === 0) status.textContent = `rendering ${dir}: ${i + 1}/${cfg.frames}`;
  }
}

(async () => {
  try {
    await exportSet(1600, 900, cfg.dirs[0], sceneName === "city" ? 0.85 : 0.82);
    await exportSet(960, 540, cfg.dirs[1], 0.8);
    status.textContent = `DONE — ${sceneName} exported`;
    window.__done = true;
  } catch (e) {
    window.__error = String(e);
    status.textContent = "ERROR: " + e;
  }
})();
</script>
</body>
</html>
